<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoLens — 专业摄影评分 + MBTI 分析</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo-wrap">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="9" r="4"/><circle cx="16" cy="7" r="2.5"/><path d="M2 21l5.5-7 3.5 4.5 3-4 5.5 6.5"/>
                </svg>
            </div>
            <span class="logo-text">PhotoLens</span>
        </div>
        <p class="subtitle">7维专业摄影评分 · 6种后期增强 · MBTI 人格推测 · 受众分析</p>
    </header>

    <main class="main">
        <!-- 上传区 -->
        <section id="upload-section" class="card upload-card">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-icon">
                    <svg width="60" height="60" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M32 10v30M16 26l16-16 16 16"/><path d="M12 46v4a4 4 0 004 4h32a4 4 0 004-4v-4"/>
                    </svg>
                </div>
                <p class="drop-text">拖放照片到此处，或点击选择文件</p>
                <p class="drop-hint">支持 JPG / PNG / WebP · 最大 20MB · 支持 Ctrl+V 粘贴</p>
                <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" hidden>
            </div>
            <div id="upload-preview" class="upload-preview hidden">
                <img id="preview-img" src="" alt="预览">
                <div class="preview-actions">
                    <button id="reupload-btn" class="btn btn-outline">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                        重新选择
                    </button>
                    <button id="analyze-btn" class="btn btn-primary">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        开始分析
                    </button>
                </div>
            </div>
        </section>

        <!-- 加载态 -->
        <section id="loading-section" class="card hidden">
            <div class="loading-container">
                <div class="loading-spinner-wrap"><div class="loading-spinner"></div><div class="loading-pulse"></div></div>
                <p class="loading-text">正在深度分析您的照片...</p>
                <p class="loading-sub">7维美学评分 · MBTI 人格推测 · 受众画像分析 · 风格推荐</p>
            </div>
        </section>

        <!-- 结果区 -->
        <section id="results-section" class="hidden">
            <!-- 综合评分 -->
            <div class="overall-card card">
                <div class="overall-layout">
                    <div class="score-ring-wrapper">
                        <svg class="score-ring-svg" viewBox="0 0 120 120">
                            <circle cx="60" cy="60" r="52" class="ring-bg"/>
                            <circle cx="60" cy="60" r="52" class="ring-progress" id="ring-progress"/>
                        </svg>
                        <div class="score-inner">
                            <span class="score-number" id="overall-score">--</span>
                            <span class="score-label" id="overall-label">--</span>
                        </div>
                    </div>
                    <div class="overall-info">
                        <h2>综合评分</h2>
                        <p id="overall-summary"></p>
                        <div class="score-badges" id="score-badges"></div>
                    </div>
                </div>
            </div>

            <!-- 4列布局 -->
            <div class="results-grid">
                <!-- 原始照片 -->
                <div class="card result-panel">
                    <h3 class="panel-title">
                        <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        原始照片
                    </h3>
                    <div class="image-container"><img id="original-img" src="" alt="原始照片"></div>
                    <div class="image-meta"></div>
                    <div class="histogram-box"><p class="histogram-label">直方图</p><img id="original-histogram" src="" alt="直方图"></div>
                </div>

                <!-- 7维评分 -->
                <div class="card result-panel">
                    <h3 class="panel-title">
                        <svg class="panel-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10M18 20V4M6 20v-4"/></svg>
                        七维评分
                    </h3>
                    <div id="dimensions-container" class="dimensions-list"></div>
                </div>

                <!-- MBTI 推测 -->
                <div id="mbti-section" class="card result-panel hidden">
                    <!-- JS 动态填充 -->
                </div>

                <!-- 受众画像 + 增强 -->
                <div class="card result-panel">
                    <div class="style-tabs" id="style-tabs"></div>
                    <div class="enhanced-area" id="enhanced-area">
                        <div class="comparison-wrapper" id="comparison-wrapper">
                            <div class="comparison-before"><span class="comparison-tag">原图</span><img id="comparison-original" src="" alt="原图"></div>
                            <div class="comparison-after"><span class="comparison-tag">增强后</span><img id="comparison-enhanced" src="" alt="增强后"></div>
                        </div>
                    </div>
                    <div class="enhanced-actions">
                        <span class="style-desc" id="style-desc"></span>
                        <button id="download-btn" class="btn btn-primary btn-sm">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            下载
                        </button>
                    </div>
                    <div class="histogram-compare">
                        <div class="histogram-box"><p class="histogram-label">原图直方图</p><img id="compare-hist-original" src="" alt=""></div>
                        <div class="histogram-box"><p class="histogram-label">增强后直方图</p><img id="compare-hist-enhanced" src="" alt=""></div>
                    </div>
                    <!-- 受众分析内嵌 -->
                    <div id="audience-section" class="hidden" style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);">
                        <!-- JS 动态填充 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 错误态 -->
        <section id="error-section" class="card hidden">
            <div class="error-icon">!</div>
            <p id="error-message" class="error-text"></p>
            <button id="retry-btn" class="btn btn-outline">重新上传</button>
        </section>
    </main>

    <footer class="footer"><p>PhotoLens v4 — 基于 PPA/PSA 专业摄影评分体系 · MBTI 人格分析 · 受众画像</p></footer>
    <script src="/js/main.js"></script>
</body>
</html>
